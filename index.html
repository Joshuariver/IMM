<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMM Research Explorer</title>
    <!-- Official DaisyUI 4.12.10 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Style definitions -->
    <link rel="stylesheet" href="./styles.css" />
    <script src="./data.js"></script>
    <script defer src="./main.js"></script>
  </head>
  <body class="bg-base-200 text-base-content min-h-screen lg:h-screen lg:overflow-hidden flex flex-col antialiased">
    <!-- Navbar / Header -->
    <header class="navbar bg-base-100 border-b border-base-300 shadow-sm px-6 py-4 flex items-center justify-between z-10 shrink-0">
      <div class="flex items-center gap-3">
        <!-- Logo / Icon -->
        <div class="p-2 bg-primary/10 rounded-xl text-primary border border-primary/20">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
        </div>
        <div>
          <h1 class="text-base font-bold text-base-content tracking-tight flex items-center gap-2">
            논문 아카이브 <span class="badge badge-primary badge-xs py-1.5 px-2 font-bold tracking-wider uppercase">Explorer</span>
          </h1>
          <p class="text-xs text-base-content/60">
            Industrial Marketing Management (IMM) HTML 검색 도구
          </p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <!-- Statistics Badge -->
        <div class="flex items-center gap-2 text-xs bg-base-200 border border-base-300 px-3.5 py-1.5 rounded-full">
          <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
          <span class="text-base-content/70">검색결과:</span>
          <span class="font-bold text-primary" id="resultCount">0 / 0</span>
        </div>
      </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex-1 flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden">
      <!-- Left Column: Search & Results (Width: ~450px) -->
      <aside class="w-full lg:w-[450px] xl:w-[480px] flex flex-col border-b lg:border-b-0 lg:border-r border-base-300 shrink-0 lg:h-full lg:overflow-hidden bg-base-100">
        <!-- Search & Filter Controls -->
        <div class="p-4 border-b border-base-300 flex flex-col gap-4 bg-base-100">
          <!-- Search Field -->
          <div class="flex gap-2">
            <div class="relative flex-1">
              <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-base-content/40">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
              </span>
              <input 
                id="query" 
                type="search" 
                class="input input-bordered w-full input-sm pl-9" 
                placeholder="제목, 저자, 본문 키워드 검색..." 
              />
            </div>
            <button 
              id="clear" 
              type="button" 
              class="btn btn-sm btn-outline btn-neutral"
            >
              초기화
            </button>
          </div>

          <!-- Volume Filters -->
          <div class="flex flex-col gap-2">
            <span class="text-[10px] font-bold text-base-content/60 tracking-wider uppercase">Volume 필터</span>
            <div id="volumeFilters" class="flex flex-wrap gap-1.5">
              <!-- Rendered by JS -->
            </div>
          </div>
        </div>

        <!-- Results List Pane -->
        <div id="results" class="flex-1 overflow-y-auto bg-base-200/20">
          <!-- Rendered by JS as beautiful list cards -->
        </div>
      </aside>

      <!-- Right Column: Document Viewer (Reader Pane) -->
      <main class="flex-1 flex flex-col bg-base-200 lg:h-full lg:overflow-hidden">
        <!-- Selected Document Header / Info -->
        <div class="px-6 py-5 border-b border-base-300 bg-base-100 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shrink-0 shadow-sm">
          <div class="min-w-0 flex-1">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="badge badge-outline badge-primary badge-xs uppercase font-bold tracking-wider" id="selectedVolume">
                ALL
              </span>
              <span class="text-xs text-base-content/60 font-medium" id="selectedMeta">
                검색 결과에서 하나를 누르면 아래 미리보기와 함께 표시됩니다.
              </span>
            </div>
            <h2 class="text-base md:text-lg font-bold text-base-content mt-2 tracking-tight leading-snug" id="selectedTitle">
              문서를 선택하세요
            </h2>
          </div>
          <div class="flex gap-2 shrink-0 self-start sm:self-center">
            <button 
              id="copyApa" 
              type="button" 
              class="btn btn-sm btn-outline btn-primary inline-flex items-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-150 active:scale-95" 
              disabled
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
              </svg>
              APA7 복사
            </button>
            <button 
              id="doiSearch" 
              type="button" 
              class="btn btn-sm btn-primary text-white inline-flex items-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-150 active:scale-95" 
              disabled
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
              </svg>
              DOI 검색
            </button>
          </div>
        </div>

        <!-- Selected Document Body (Reader) -->
        <div class="flex-1 overflow-y-auto p-6 md:p-8 lg:p-10 flex flex-col gap-6 scrollbar-thin">
          <!-- Small Banner showing loaded state -->
          <div class="text-xs text-base-content/60 font-medium flex items-center gap-2 bg-base-100 p-2.5 rounded-xl border border-base-300 w-fit shrink-0 shadow-sm">
            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span id="previewStatus">검색 결과에서 문서를 선택하세요.</span>
          </div>

          <!-- Document content container (acts as spacing wrapper, the loaded cards sit here) -->
          <div 
            id="previewContent" 
            class="flex-1 max-w-4xl mx-auto w-full space-y-6 animate-fade-in"
          >
            <!-- Rendered by JS -->
          </div>
        </div>
      </main>
    </div>
    <noscript>
      <div class="fixed inset-0 bg-base-200 flex items-center justify-center p-6 text-center z-50">
        <div class="max-w-md bg-base-100 border border-base-300 p-8 rounded-2xl shadow-lg">
          <h2 class="text-xl font-bold text-base-content mb-2">JavaScript Required</h2>
          <p class="text-base-content/70 text-sm">이 화면은 JavaScript가 필요합니다. 브라우저 설정에서 활성화해주세요.</p>
        </div>
      </div>
    </noscript>
  </body>
</html>
